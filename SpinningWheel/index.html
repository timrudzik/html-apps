<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Spinning Wheel</title>
  <style>
    :root { --bg:#111827; --card:#1f2937; --line:#374151; --text:#f9fafb; --muted:#9ca3af; --accent:#22d3ee; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; font-family:"Avenir Next","Segoe UI",sans-serif; background:radial-gradient(circle at top,#1f2937,#0b1220 60%); color:var(--text); }
    .app { width:min(860px, calc(100% - 24px)); background:rgba(31,41,55,.9); border:1px solid var(--line); border-radius:20px; padding:18px; }
    h1 { margin:0 0 8px; font-size:clamp(1.4rem,3vw,2rem); }
    p { margin:0 0 14px; color:var(--muted); }
    .layout { display:grid; grid-template-columns: 1fr 300px; gap:16px; }
    canvas { width:100%; max-width:520px; aspect-ratio:1; background:#0f172a; border:1px solid var(--line); border-radius:50%; justify-self:center; }
    .panel { display:grid; gap:10px; align-content:start; }
    textarea,input,button { width:100%; font:inherit; border-radius:12px; border:1px solid var(--line); }
    textarea,input { background:#111827; color:var(--text); padding:10px; }
    button { min-height:44px; background:linear-gradient(135deg,#0891b2,#22d3ee); color:#06222a; font-weight:800; cursor:pointer; }
    .result { padding:10px; border:1px solid var(--line); border-radius:12px; background:#111827; }
    @media (max-width: 820px){ .layout{grid-template-columns:1fr;} canvas{max-width:420px;} }
  </style>
</head>
<body>
  <main class="app">
    <h1>Spinning Wheel</h1>
    <p>Einfach Begriffe eintragen, drehen und zufaellig auswaehlen.</p>
    <section class="layout">
      <canvas id="wheel" width="520" height="520" aria-label="Gluecksrad"></canvas>
      <div class="panel">
        <textarea id="items" rows="8">Pizza
Sushi
Pasta
Burger
Salat
Tacos</textarea>
        <input id="duration" type="number" min="2" max="12" step="1" value="5" aria-label="Dauer in Sekunden">
        <button id="spin">Drehen</button>
        <div class="result" id="result">Ergebnis: –</div>
      </div>
    </section>
  </main>
<script>
  const canvas = document.getElementById('wheel');
  const ctx = canvas.getContext('2d');
  const input = document.getElementById('items');
  const durationInput = document.getElementById('duration');
  const resultEl = document.getElementById('result');
  const spinBtn = document.getElementById('spin');
  let angle = 0;
  let spinning = false;

  function getItems(){
    return input.value.split('\n').map(v => v.trim()).filter(Boolean);
  }

  function draw(){
    const items = getItems();
    const count = Math.max(items.length, 1);
    const step = (Math.PI * 2) / count;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.save();
    ctx.translate(canvas.width/2, canvas.height/2);
    ctx.rotate(angle);

    for(let i=0;i<count;i++){
      ctx.beginPath();
      ctx.moveTo(0,0);
      ctx.arc(0,0,245, i*step, (i+1)*step);
      ctx.closePath();
      ctx.fillStyle = `hsl(${(i * 360 / count)|0} 75% 55%)`;
      ctx.fill();

      ctx.save();
      ctx.rotate(i*step + step/2);
      ctx.textAlign = 'right';
      ctx.fillStyle = '#0b1020';
      ctx.font = '700 20px "Avenir Next", sans-serif';
      const label = items[i] ?? 'Leer';
      ctx.fillText(label.slice(0,16), 220, 7);
      ctx.restore();
    }

    ctx.beginPath();
    ctx.arc(0,0,34,0,Math.PI*2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.restore();

    ctx.fillStyle = '#22d3ee';
    ctx.beginPath();
    ctx.moveTo(canvas.width/2, 14);
    ctx.lineTo(canvas.width/2 - 14, 48);
    ctx.lineTo(canvas.width/2 + 14, 48);
    ctx.closePath();
    ctx.fill();
  }

  function pickWinner(){
    const items = getItems();
    if(!items.length) return null;
    const normalized = ((Math.PI * 1.5 - angle) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
    const step = (Math.PI * 2) / items.length;
    const index = Math.floor(normalized / step) % items.length;
    return items[index];
  }

  function spin(){
    if(spinning) return;
    const items = getItems();
    if(items.length < 2){
      resultEl.textContent = 'Ergebnis: Bitte mindestens 2 Begriffe eingeben.';
      return;
    }
    spinning = true;
    spinBtn.disabled = true;
    const seconds = Math.min(12, Math.max(2, Number(durationInput.value) || 5));
    const start = performance.now();
    const startAngle = angle;
    const extra = Math.PI * 2 * (5 + Math.random() * 4);

    function frame(now){
      const t = Math.min(1, (now - start) / (seconds * 1000));
      const eased = 1 - Math.pow(1 - t, 3);
      angle = startAngle + extra * eased;
      draw();
      if(t < 1){
        requestAnimationFrame(frame);
      } else {
        spinning = false;
        spinBtn.disabled = false;
        resultEl.textContent = `Ergebnis: ${pickWinner()}`;
      }
    }
    requestAnimationFrame(frame);
  }

  input.addEventListener('input', draw);
  spinBtn.addEventListener('click', spin);
  draw();
</script>
</body>
</html>
