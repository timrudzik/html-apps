<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#171a1f">
  <title>html-apps</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3efe8;
      --bg-soft: #fbf8f4;
      --surface: rgba(255, 252, 247, 0.78);
      --surface-strong: rgba(255, 253, 250, 0.94);
      --line: rgba(23, 26, 31, 0.08);
      --ink: #171a1f;
      --muted: #666d78;
      --shadow: 0 20px 60px rgba(43, 35, 30, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Helvetica Neue", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(231, 197, 153, 0.3), transparent 26%),
        radial-gradient(circle at top right, rgba(144, 173, 209, 0.18), transparent 24%),
        linear-gradient(180deg, var(--bg-soft), var(--bg));
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: linear-gradient(rgba(23, 26, 31, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(23, 26, 31, 0.03) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.55), transparent 72%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      width: min(1040px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 56px;
      position: relative;
      z-index: 1;
    }

    .hero {
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.28)),
        var(--surface);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .eyebrow::before {
      content: "";
      width: 34px;
      height: 1px;
      background: rgba(23, 26, 31, 0.16);
    }

    h1 {
      margin: 0;
      max-width: 10ch;
      font-family: "Iowan Old Style", "Palatino Linotype", serif;
      font-size: clamp(3rem, 8vw, 5.2rem);
      line-height: 0.93;
      letter-spacing: -0.05em;
    }

    .hero p {
      margin: 18px 0 0;
      max-width: 36rem;
      font-size: 1.02rem;
      line-height: 1.65;
      color: var(--muted);
    }

    .meta-row {
      margin-top: 26px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .meta-pill {
      display: inline-flex;
      align-items: center;
      min-height: 42px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.56);
      color: var(--muted);
      font-size: 0.95rem;
      backdrop-filter: blur(10px);
    }

    .section-head {
      margin: 28px 0 14px;
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
    }

    h2 {
      margin: 0;
      font-size: 1.2rem;
      letter-spacing: -0.03em;
    }

    .section-head p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .app-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 14px;
    }

    .app-card {
      --accent: #171a1f;
      display: grid;
      gap: 18px;
      min-height: 220px;
      padding: 20px;
      border-radius: 24px;
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.52)),
        var(--surface-strong);
      box-shadow: 0 16px 36px rgba(43, 35, 30, 0.08);
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
    }

    .app-card:hover {
      transform: translateY(-3px);
      border-color: rgba(23, 26, 31, 0.14);
      box-shadow: 0 24px 46px rgba(43, 35, 30, 0.12);
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .app-mark {
      width: 13px;
      height: 13px;
      margin-top: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 8px rgba(255, 255, 255, 0.74);
      flex-shrink: 0;
    }

    .app-type {
      margin: 0 0 8px;
      font-size: 0.74rem;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .app-card h3 {
      margin: 0;
      font-size: 1.65rem;
      line-height: 1;
      letter-spacing: -0.05em;
    }

    .app-card p {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .tag-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tag {
      display: inline-flex;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(23, 26, 31, 0.04);
      border: 1px solid rgba(23, 26, 31, 0.07);
      color: var(--muted);
      font-size: 0.84rem;
    }

    .app-link {
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 14px;
      min-height: 48px;
      padding: 0 14px;
      border-radius: 16px;
      background: rgba(23, 26, 31, 0.04);
      border: 1px solid rgba(23, 26, 31, 0.07);
      font-weight: 700;
    }

    .app-link span:last-child {
      color: var(--muted);
    }

    @media (max-width: 640px) {
      .page {
        width: min(1040px, calc(100% - 20px));
        padding-top: 20px;
      }

      .hero,
      .app-card {
        padding: 18px;
        border-radius: 22px;
      }

      .section-head {
        align-items: flex-start;
        flex-direction: column;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="hero">
      <div class="eyebrow">html-apps</div>
      <h1>Kleine Programme. Sauber gesammelt.</h1>
      <p>
        Eine reduzierte Uebersicht fuer kleine Tools und Games.
        Ruhig im Look, klar im Aufbau und direkt startklar.
      </p>
      <div class="meta-row">
        <div class="meta-pill"><span id="appCount">0</span>&nbsp;Programme</div>
        <div class="meta-pill">GitHub Pages ready</div>
        <div class="meta-pill">Mobile freundlich</div>
      </div>
    </header>

    <section aria-labelledby="apps-title">
      <div class="section-head">
        <h2 id="apps-title">Programme</h2>
        <p>Kompakt, clean und offen fuer mehr.</p>
      </div>

      <div id="appGrid" class="app-grid"></div>
    </section>
  </main>

  <script>
    // Neue Apps hier ergaenzen.
    const apps = [
      {
        name: "Timer",
        type: "Utility",
        href: "./Timer/",
        description: "Ein schneller Timer fuer Fokus-Sessions, Countdowns und kurze Routinen.",
        tags: ["Fokus", "Countdown"],
        accent: "#1f4f7a"
      },
      {
        name: "Imposter",
        type: "Game",
        href: "./Imposter/",
        description: "Ein Social Game fuer kleine Gruppen mit direktem Einstieg und klarer UI.",
        tags: ["Party", "Gruppe"],
        accent: "#9a4e2f"
      }
    ];

    const appGrid = document.getElementById("appGrid");
    const appCount = document.getElementById("appCount");

    appCount.textContent = apps.length;

    appGrid.innerHTML = apps.map((app) => `
      <article class="app-card" style="--accent: ${app.accent};">
        <div>
          <div class="card-top">
            <div>
              <p class="app-type">${app.type}</p>
              <h3>${app.name}</h3>
            </div>
            <span class="app-mark" aria-hidden="true"></span>
          </div>
          <p>${app.description}</p>
        </div>
        <div>
          <div class="tag-row">
            ${app.tags.map((tag) => `<span class="tag">${tag}</span>`).join("")}
          </div>
          <a class="app-link" href="${app.href}">
            <span>App oeffnen</span>
            <span>→</span>
          </a>
        </div>
      </article>
    `).join("");
  </script>
</body>
</html>
