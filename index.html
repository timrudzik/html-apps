<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#171a1f">
  <title>html-apps</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f2ec;
      --surface-strong: rgba(255, 255, 253, 0.88);
      --line: rgba(23, 26, 31, 0.07);
      --ink: #171a1f;
      --muted: #666d78;
      --shadow: 0 18px 40px rgba(43, 35, 30, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Helvetica Neue", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.72), transparent 30%),
        linear-gradient(180deg, #faf8f4, var(--bg));
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.34), transparent 28%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      width: min(960px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0 56px;
      position: relative;
      z-index: 1;
    }

    .app-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    .app-card {
      --accent: #171a1f;
      display: grid;
      gap: 18px;
      min-height: 220px;
      padding: 22px;
      border-radius: 22px;
      border: 1px solid var(--line);
      background: var(--surface-strong);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
    }

    .app-card:hover {
      transform: translateY(-3px);
      border-color: rgba(23, 26, 31, 0.14);
      box-shadow: 0 24px 46px rgba(43, 35, 30, 0.12);
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .app-mark {
      width: 13px;
      height: 13px;
      margin-top: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 8px rgba(255, 255, 255, 0.74);
      flex-shrink: 0;
    }

    .app-type {
      margin: 0 0 8px;
      font-size: 0.74rem;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .app-card h3 {
      margin: 0;
      font-size: 1.65rem;
      line-height: 1;
      letter-spacing: -0.05em;
    }

    .app-card p {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .tag-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tag {
      display: inline-flex;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(23, 26, 31, 0.04);
      border: 1px solid rgba(23, 26, 31, 0.07);
      color: var(--muted);
      font-size: 0.84rem;
    }

    .app-link {
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 14px;
      min-height: 48px;
      padding: 0 14px;
      border-radius: 16px;
      background: rgba(23, 26, 31, 0.04);
      border: 1px solid rgba(23, 26, 31, 0.07);
      font-weight: 700;
    }

    .app-link span:last-child {
      color: var(--muted);
    }

    @media (max-width: 640px) {
      .page {
        width: min(960px, calc(100% - 20px));
        padding-top: 20px;
      }

      .app-card {
        padding: 18px;
        border-radius: 20px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div id="appGrid" class="app-grid" aria-label="Programme"></div>
  </main>

  <script>
    // Neue Apps hier ergaenzen.
    const apps = [
      {
        name: "Timer",
        type: "Utility",
        href: "./Timer/",
        description: "Ein schneller Timer fuer Fokus-Sessions, Countdowns und kurze Routinen.",
        tags: ["Fokus", "Countdown"],
        accent: "#1f4f7a"
      },
      {
        name: "Imposter",
        type: "Game",
        href: "./Imposter/",
        description: "Ein Social Game fuer kleine Gruppen mit direktem Einstieg und klarer UI.",
        tags: ["Party", "Gruppe"],
        accent: "#9a4e2f"
      }
    ];

    const appGrid = document.getElementById("appGrid");
    appGrid.innerHTML = apps.map((app) => `
      <article class="app-card" style="--accent: ${app.accent};">
        <div>
          <div class="card-top">
            <div>
              <p class="app-type">${app.type}</p>
              <h3>${app.name}</h3>
            </div>
            <span class="app-mark" aria-hidden="true"></span>
          </div>
          <p>${app.description}</p>
        </div>
        <div>
          <div class="tag-row">
            ${app.tags.map((tag) => `<span class="tag">${tag}</span>`).join("")}
          </div>
          <a class="app-link" href="${app.href}">
            <span>App oeffnen</span>
            <span>→</span>
          </a>
        </div>
      </article>
    `).join("");
  </script>
</body>
</html>
