<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ultra Timer</title>
  <style>
    :root {
      --bg-1: #0f1021;
      --bg-2: #252765;
      --bg-3: #3d1e6d;
      --text: #f8f9ff;
      --muted: #b3b7dd;
      --glass: rgba(255, 255, 255, 0.12);
      --glass-strong: rgba(255, 255, 255, 0.2);
      --accent: #80ffea;
      --accent-2: #7aa2ff;
      --danger: #ff7f9f;
      --ok: #6ef5a6;
      --shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(128, 255, 234, 0.15), transparent 40%),
        radial-gradient(circle at 80% 0%, rgba(122, 162, 255, 0.16), transparent 45%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2) 45%, var(--bg-3));
      display: flex;
      justify-content: center;
      padding: 28px 14px;
    }

    .app {
      width: min(1040px, 100%);
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 16px;
    }

    .card {
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: var(--glass);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.7rem, 2.5vw, 2.2rem);
      letter-spacing: 0.02em;
    }

    .sub {
      color: var(--muted);
      margin-top: 6px;
      font-size: 0.95rem;
    }

    .mode-row {
      margin-top: 18px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      border-radius: 999px;
      padding: 9px 14px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s ease;
    }

    .chip.active {
      background: linear-gradient(90deg, rgba(128, 255, 234, 0.35), rgba(122, 162, 255, 0.35));
      border-color: rgba(128, 255, 234, 0.8);
    }

    .timer-shell {
      margin-top: 18px;
      border-radius: 20px;
      padding: 22px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(8, 10, 26, 0.44);
    }

    .ring {
      width: min(340px, 82vw);
      aspect-ratio: 1;
      border-radius: 50%;
      display: grid;
      place-items: center;
      margin: 0 auto;
      position: relative;
      background:
        radial-gradient(circle at center, rgba(20, 24, 57, 0.9) 58%, transparent 59%),
        conic-gradient(var(--accent) var(--progress, 0%), rgba(255, 255, 255, 0.12) 0);
      box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.45), 0 25px 35px rgba(0, 0, 0, 0.3);
    }

    .ring::after {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.2);
      pointer-events: none;
    }

    .display-wrap {
      text-align: center;
      position: relative;
      z-index: 1;
    }

    #display {
      font-size: clamp(2.1rem, 6vw, 4rem);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.03em;
      text-shadow: 0 0 24px rgba(128, 255, 234, 0.25);
    }

    #statusLine {
      margin-top: 8px;
      font-size: 0.95rem;
      color: var(--muted);
      min-height: 1.2em;
    }

    .controls {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 11px 16px;
      min-width: 96px;
      color: #050810;
      background: linear-gradient(120deg, var(--accent), #8dd5ff);
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      box-shadow: 0 8px 18px rgba(128, 255, 234, 0.28);
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 22px rgba(128, 255, 234, 0.32);
    }

    button.secondary {
      background: rgba(255, 255, 255, 0.2);
      color: var(--text);
      box-shadow: none;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    button.danger {
      background: linear-gradient(120deg, #ff6a95, #ff9f63);
      box-shadow: 0 8px 18px rgba(255, 122, 169, 0.25);
    }

    .config-grid {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(3, minmax(80px, 1fr));
      gap: 10px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      text-align: left;
    }

    label {
      font-size: 0.82rem;
      color: var(--muted);
    }

    input,
    select {
      width: 100%;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(0, 0, 0, 0.25);
      color: var(--text);
      padding: 9px 10px;
      font-size: 0.95rem;
    }

    .presets,
    .panel-section {
      margin-top: 14px;
    }

    .preset-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .panel-title {
      margin: 0 0 8px;
      font-size: 1rem;
      color: #e8ebff;
    }

    .lap-list,
    .history {
      list-style: none;
      margin: 0;
      padding: 0;
      max-height: 235px;
      overflow: auto;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(0, 0, 0, 0.2);
    }

    .lap-list li,
    .history li {
      padding: 9px 11px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 0.92rem;
    }

    .lap-list li:last-child,
    .history li:last-child {
      border-bottom: 0;
    }

    .empty {
      color: var(--muted);
      padding: 12px;
      text-align: center;
      font-size: 0.9rem;
    }

    .badge {
      border-radius: 999px;
      font-size: 0.78rem;
      padding: 3px 8px;
      background: rgba(110, 245, 166, 0.2);
      color: var(--ok);
      border: 1px solid rgba(110, 245, 166, 0.3);
    }

    @media (max-width: 930px) {
      .app {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="card">
      <h1>Ultra Timer ⚡</h1>
      <p class="sub">Stoppuhr, Countdown, Intervall-Mode, Runden, Presets und Verlauf in einer App.</p>

      <div class="mode-row" role="tablist" aria-label="Timer-Modus">
        <button class="chip active" data-mode="stopwatch">Stoppuhr</button>
        <button class="chip" data-mode="countdown">Countdown</button>
        <button class="chip" data-mode="interval">Intervall</button>
      </div>

      <div class="timer-shell">
        <div class="ring" id="ring">
          <div class="display-wrap">
            <div id="display">00:00.0</div>
            <div id="statusLine">Bereit.</div>
          </div>
        </div>

        <div class="controls">
          <button id="start">Start</button>
          <button id="pause" class="secondary">Pause</button>
          <button id="lap" class="secondary">Runde</button>
          <button id="reset" class="danger">Reset</button>
        </div>

        <div class="config-grid" id="configArea">
          <div class="field">
            <label for="minutes">Minuten</label>
            <input id="minutes" type="number" min="0" max="999" value="5">
          </div>
          <div class="field">
            <label for="seconds">Sekunden</label>
            <input id="seconds" type="number" min="0" max="59" value="0">
          </div>
          <div class="field" id="roundsField">
            <label for="rounds">Runden</label>
            <input id="rounds" type="number" min="1" max="40" value="8">
          </div>
        </div>

        <div class="presets panel-section" id="presetBlock">
          <h2 class="panel-title">Schnell-Presets</h2>
          <div class="preset-row">
            <button class="secondary preset" data-mins="0" data-secs="30">30s</button>
            <button class="secondary preset" data-mins="1" data-secs="0">1m</button>
            <button class="secondary preset" data-mins="5" data-secs="0">5m</button>
            <button class="secondary preset" data-mins="10" data-secs="0">10m</button>
            <button class="secondary preset" data-mins="25" data-secs="0">Pomodoro</button>
          </div>
        </div>
      </div>
    </section>

    <aside class="card">
      <section class="panel-section">
        <h2 class="panel-title">Runden</h2>
        <ul class="lap-list" id="lapList"><li class="empty">Noch keine Runden.</li></ul>
      </section>

      <section class="panel-section">
        <h2 class="panel-title">Sitzungsverlauf</h2>
        <ul class="history" id="historyList"><li class="empty">Noch kein Verlauf gespeichert.</li></ul>
      </section>

      <section class="panel-section">
        <h2 class="panel-title">Optionen</h2>
        <div class="field">
          <label for="soundToggle">Alarm</label>
          <select id="soundToggle">
            <option value="on">An</option>
            <option value="off">Aus</option>
          </select>
        </div>
      </section>
    </aside>
  </main>

  <script>
    const display = document.getElementById('display');
    const statusLine = document.getElementById('statusLine');
    const ring = document.getElementById('ring');
    const modeButtons = [...document.querySelectorAll('.chip')];
    const startButton = document.getElementById('start');
    const pauseButton = document.getElementById('pause');
    const lapButton = document.getElementById('lap');
    const resetButton = document.getElementById('reset');
    const minutesInput = document.getElementById('minutes');
    const secondsInput = document.getElementById('seconds');
    const roundsInput = document.getElementById('rounds');
    const roundsField = document.getElementById('roundsField');
    const presetBlock = document.getElementById('presetBlock');
    const lapList = document.getElementById('lapList');
    const historyList = document.getElementById('historyList');
    const soundToggle = document.getElementById('soundToggle');
    const presetButtons = [...document.querySelectorAll('.preset')];

    const state = {
      mode: 'stopwatch',
      running: false,
      timerId: null,
      startedAt: 0,
      elapsedMs: 0,
      durationMs: 300000,
      rounds: 8,
      intervalRound: 1,
      intervalWork: true,
      currentRoundMs: 0,
      laps: [],
      history: JSON.parse(localStorage.getItem('ultraTimerHistory') || '[]')
    };

    function clamp(num, min, max) {
      return Math.max(min, Math.min(max, Number(num) || 0));
    }

    function getConfiguredDurationMs() {
      const mins = clamp(minutesInput.value, 0, 999);
      const secs = clamp(secondsInput.value, 0, 59);
      return (mins * 60 + secs) * 1000;
    }

    function formatMs(ms, withTenths = false) {
      const total = Math.max(0, Math.floor(ms));
      const totalSeconds = Math.floor(total / 1000);
      const hrs = Math.floor(totalSeconds / 3600);
      const mins = Math.floor((totalSeconds % 3600) / 60);
      const secs = totalSeconds % 60;
      const tenths = Math.floor((total % 1000) / 100);

      const hh = hrs ? String(hrs).padStart(2, '0') + ':' : '';
      const mm = String(mins).padStart(2, '0');
      const ss = String(secs).padStart(2, '0');

      return withTenths ? `${hh}${mm}:${ss}.${tenths}` : `${hh}${mm}:${ss}`;
    }

    function playAlarm() {
      if (soundToggle.value === 'off') {
        return;
      }
      const context = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = context.createOscillator();
      const gain = context.createGain();
      oscillator.type = 'triangle';
      oscillator.frequency.value = 740;
      oscillator.connect(gain);
      gain.connect(context.destination);
      gain.gain.setValueAtTime(0.0001, context.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.15, context.currentTime + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, context.currentTime + 0.35);
      oscillator.start();
      oscillator.stop(context.currentTime + 0.36);
    }

    function setProgress(percent) {
      ring.style.setProperty('--progress', `${clamp(percent, 0, 100)}%`);
    }

    function renderHistory() {
      if (!state.history.length) {
        historyList.innerHTML = '<li class="empty">Noch kein Verlauf gespeichert.</li>';
        return;
      }

      historyList.innerHTML = state.history
        .slice(0, 18)
        .map(entry => `
          <li>
            <span>${entry.mode}</span>
            <span>${entry.result}</span>
          </li>
        `)
        .join('');
    }

    function renderLaps() {
      if (!state.laps.length) {
        lapList.innerHTML = '<li class="empty">Noch keine Runden.</li>';
        return;
      }
      lapList.innerHTML = state.laps
        .map((lap, index) => `
          <li>
            <span>#${index + 1}</span>
            <span>${lap}</span>
          </li>
        `)
        .reverse()
        .join('');
    }

    function pushHistory(result) {
      const modeLabel = state.mode === 'stopwatch' ? 'Stoppuhr' : state.mode === 'countdown' ? 'Countdown' : 'Intervall';
      state.history.unshift({ mode: modeLabel, result });
      state.history = state.history.slice(0, 30);
      localStorage.setItem('ultraTimerHistory', JSON.stringify(state.history));
      renderHistory();
    }

    function updateModeUI() {
      modeButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.mode === state.mode));
      const isStopwatch = state.mode === 'stopwatch';
      const isInterval = state.mode === 'interval';
      document.getElementById('configArea').style.display = isStopwatch ? 'none' : 'grid';
      roundsField.style.display = isInterval ? 'flex' : 'none';
      presetBlock.style.display = isStopwatch ? 'none' : 'block';
      lapButton.style.display = isStopwatch ? 'inline-block' : 'none';
      if (isStopwatch) {
        statusLine.textContent = 'Stoppuhr bereit.';
      } else if (isInterval) {
        statusLine.textContent = 'Intervall bereit: Arbeit / Pause im Wechsel.';
      } else {
        statusLine.textContent = 'Countdown bereit.';
      }
      resetAllVisuals();
    }

    function resetAllVisuals() {
      state.elapsedMs = 0;
      state.currentRoundMs = 0;
      state.intervalRound = 1;
      state.intervalWork = true;
      state.laps = [];
      renderLaps();
      render();
    }

    function getModeDuration() {
      return Math.max(1000, getConfiguredDurationMs());
    }

    function render() {
      if (state.mode === 'stopwatch') {
        display.textContent = formatMs(state.elapsedMs, true);
        const pseudoCycle = (state.elapsedMs % 60000) / 600;
        setProgress(pseudoCycle);
        return;
      }

      const duration = state.mode === 'interval' ? state.currentRoundMs : state.durationMs;
      const left = Math.max(0, duration - state.elapsedMs);
      display.textContent = formatMs(left, true);
      const progress = 100 - (left / duration) * 100;
      setProgress(progress);
    }

    function stopTicker() {
      if (state.timerId !== null) {
        clearInterval(state.timerId);
      }
      state.timerId = null;
      state.running = false;
      startButton.textContent = 'Start';
    }

    function tick() {
      const now = performance.now();
      const baseElapsed = now - state.startedAt;
      state.elapsedMs = baseElapsed;

      if (state.mode === 'stopwatch') {
        render();
        return;
      }

      const duration = state.mode === 'interval' ? state.currentRoundMs : state.durationMs;
      if (state.elapsedMs >= duration) {
        if (state.mode === 'countdown') {
          state.elapsedMs = duration;
          render();
          stopTicker();
          statusLine.innerHTML = 'Zeit abgelaufen! <span class="badge">Done</span>';
          pushHistory(`Abgelaufen bei ${formatMs(duration)}`);
          playAlarm();
          return;
        }

        if (state.mode === 'interval') {
          playAlarm();
          if (state.intervalWork) {
            state.intervalWork = false;
            state.elapsedMs = 0;
            state.startedAt = performance.now();
            statusLine.textContent = `Runde ${state.intervalRound}/${state.rounds}: Pause`;
            return;
          }

          state.intervalRound += 1;
          if (state.intervalRound > state.rounds) {
            render();
            stopTicker();
            statusLine.innerHTML = 'Intervall-Session fertig! <span class="badge">Stark!</span>';
            pushHistory(`Intervall ${state.rounds} Runden erledigt`);
            return;
          }

          state.intervalWork = true;
          state.elapsedMs = 0;
          state.startedAt = performance.now();
          statusLine.textContent = `Runde ${state.intervalRound}/${state.rounds}: Arbeit`;
          return;
        }
      }

      render();
    }

    function startTimer() {
      if (state.running) {
        return;
      }

      if (state.mode === 'countdown') {
        state.durationMs = getModeDuration();
      }

      if (state.mode === 'interval') {
        const base = getModeDuration();
        state.currentRoundMs = base;
        state.rounds = clamp(roundsInput.value, 1, 40);
        if (state.elapsedMs === 0) {
          state.intervalRound = 1;
          state.intervalWork = true;
          statusLine.textContent = `Runde 1/${state.rounds}: Arbeit`;
        }
      }

      state.running = true;
      state.startedAt = performance.now() - state.elapsedMs;
      state.timerId = setInterval(tick, 100);
      startButton.textContent = 'Läuft';
    }

    function pauseTimer() {
      if (!state.running) {
        return;
      }
      tick();
      stopTicker();
      statusLine.textContent = 'Pausiert.';
    }

    function resetTimer(logEntry = false) {
      if (logEntry && state.mode === 'stopwatch' && state.elapsedMs > 0) {
        pushHistory(`Gestoppt bei ${formatMs(state.elapsedMs, true)}`);
      }
      stopTicker();
      state.elapsedMs = 0;
      state.intervalRound = 1;
      state.intervalWork = true;
      if (state.mode === 'interval') {
        state.currentRoundMs = getModeDuration();
      }
      render();
      statusLine.textContent = 'Bereit.';
    }

    modeButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        const nextMode = btn.dataset.mode;
        if (nextMode === state.mode) {
          return;
        }
        resetTimer(true);
        state.mode = nextMode;
        updateModeUI();
      });
    });

    startButton.addEventListener('click', startTimer);
    pauseButton.addEventListener('click', pauseTimer);
    resetButton.addEventListener('click', () => resetTimer(true));

    lapButton.addEventListener('click', () => {
      if (state.mode !== 'stopwatch' || !state.running) {
        return;
      }
      const value = formatMs(state.elapsedMs, true);
      state.laps.push(value);
      renderLaps();
    });

    presetButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        minutesInput.value = btn.dataset.mins;
        secondsInput.value = btn.dataset.secs;
        if (state.mode !== 'stopwatch') {
          state.durationMs = getModeDuration();
          state.currentRoundMs = state.durationMs;
          state.elapsedMs = 0;
          render();
          statusLine.textContent = `Preset geladen: ${btn.textContent.trim()}`;
        }
      });
    });

    [minutesInput, secondsInput].forEach(input => {
      input.addEventListener('change', () => {
        if (state.mode !== 'stopwatch' && !state.running) {
          state.durationMs = getModeDuration();
          state.currentRoundMs = state.durationMs;
          state.elapsedMs = 0;
          render();
        }
      });
    });

    renderHistory();
    updateModeUI();
  </script>
</body>
</html>
